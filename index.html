<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Højeskole - om livet | Taastrup Medborgerhus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --deep-forest: #1B4332;
            --moss-green: #2D6A4F;
            --sage-muted: #7A8B6E;
            --linen: #E8E2D9;
            --warm-white: #F5F1EB;
            --terracotta: #B5704C;
            --burnt-sienna: #BC6C25;
            --clay: #E76F51;
            --deep-wine: #6A040F;
            --midnight: #10002B;
            --gold: #DDA15E;
            --cream: #FEFAE0;
            --stone: #B7B7A4;
            --ocean-blue: #457B9D;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #0d1b1e 0%, #1b263b 50%, #0d1b2a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.7;
            font-weight: 300;
        }

        .ambient-glow {
            position: fixed; border-radius: 50%;
            filter: blur(120px); opacity: 0.12;
            z-index: 0; pointer-events: none;
            animation: gentle-drift 30s ease-in-out infinite;
        }
        .glow-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, var(--terracotta), transparent);
            top: -20%; right: -10%;
        }
        .glow-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--burnt-orange), transparent);
            bottom: -15%; left: -10%;
            animation-delay: -12s;
        }
        .glow-3 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--ocean-blue), transparent);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -24s;
        }
        @keyframes gentle-drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -15px) scale(1.03); }
        }

        .embers {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            overflow: hidden;
        }
        .ember {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: drift-up 25s infinite linear;
            box-shadow: 0 0 6px var(--gold);
        }
        .ember:nth-child(2n) { background: var(--terracotta); width: 1px; height: 1px; box-shadow: 0 0 4px var(--terracotta); }
        .ember:nth-child(3n) { background: var(--cream); width: 3px; height: 3px; opacity: 0.2; box-shadow: 0 0 8px var(--cream); }
        @keyframes drift-up {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            15% { opacity: 0.4; }
            85% { opacity: 0.4; }
            100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
        }

        .container {
            position: relative; z-index: 10;
            max-width: 1100px;
            margin: 0 auto; padding: 2rem;
        }

        header { text-align: center; padding: 5rem 0 3rem; animation: fadeInDown 1.2s ease; }
        .venue-tag {
            display: inline-block;
            border: 1px solid rgba(201, 169, 110, 0.4);
            padding: 0.5rem 1.8rem; border-radius: 2px;
            font-size: 0.75rem; font-weight: 500;
            letter-spacing: 4px; text-transform: uppercase;
            color: var(--ochre); margin-bottom: 2.5rem;
            background: rgba(201, 169, 110, 0.05);
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 5rem; font-weight: 600;
            margin-bottom: 0.8rem; color: var(--warm-white);
            letter-spacing: -1px; line-height: 1.05;
            font-style: italic;
        }
        .subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.6rem; color: var(--ochre);
            font-weight: 400; font-style: italic;
            letter-spacing: 1px; opacity: 0.9;
        }
        .divider {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--ochre), transparent);
            margin: 2rem auto; opacity: 0.6;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem; align-items: center;
            padding: 2rem 0 5rem;
            animation: fadeIn 1s ease 0.3s both;
        }
        .hero-content h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.5rem; margin-bottom: 1.5rem;
            color: var(--gold); font-weight: 600; line-height: 1.15;
            font-style: italic;
        }
        .hero-content p {
            font-size: 1.15rem; line-height: 1.9;
            color: rgba(232, 226, 217, 0.85); margin-bottom: 1.5rem;
            font-weight: 300;
        }
        .highlight { color: var(--ochre); font-weight: 500; }
        .meta-line {
            display: flex; align-items: center; gap: 1rem;
            margin-top: 2rem; padding-top: 1.5rem;
            border-top: 1px solid rgba(201, 169, 110, 0.2);
        }
        .meta-item {
            font-size: 0.9rem; color: var(--sage-muted);
            letter-spacing: 1px;
        }
        .meta-dot { color: var(--ochre); font-size: 0.6rem; }

        .hero-image {
            position: relative; border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        .hero-image img {
            width: 100%; height: 450px;
            object-fit: cover; display: block;
            filter: brightness(0.9) contrast(1.05);
            transition: transform 6s ease;
        }
        .hero-image:hover img { transform: scale(1.03); }
        .image-frame {
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(201, 169, 110, 0.25);
            pointer-events: none; z-index: 2;
        }

        .info-strip {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 2.5rem 0;
            margin: 2rem 0 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 1s ease 0.5s both;
        }
        .info-item { text-align: center; padding: 0 1.5rem; }
        .info-label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 3px; color: var(--sage-muted);
            margin-bottom: 0.5rem; font-weight: 500;
        }
        .info-value {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem; color: var(--warm-white);
            font-weight: 600;
        }

        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-tag {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 4px; color: var(--ochre);
            margin-bottom: 1rem; display: block;
        }
        .section-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.8rem; color: var(--warm-white);
            font-weight: 600; font-style: italic; line-height: 1.2;
        }
        .section-desc {
            max-width: 600px; margin: 1.5rem auto 0;
            color: rgba(232, 226, 217, 0.7);
            font-size: 1.05rem; line-height: 1.8; font-weight: 300;
        }

        .lifebook-section { padding: 4rem 0; }
        .lifebook-intro {
            text-align: center; max-width: 700px;
            margin: 0 auto 3rem;
            color: #d0d0d0; font-size: 1.1rem; line-height: 1.7;
        }
        .lifebook-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden; margin-top: 3rem;
        }
        .lifebook-item {
            background: rgba(26, 25, 24, 0.6);
            padding: 2.5rem 1.5rem;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer; position: relative;
            overflow: hidden;
        }
        .lifebook-item::before {
            content: ''; position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--terracotta), var(--ochre));
            transform: scaleX(0);
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .lifebook-item:hover { background: rgba(44, 42, 40, 0.8); }
        .lifebook-item:hover::before { transform: scaleX(1); }
        .lifebook-number {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.85rem; color: var(--ochre);
            opacity: 0.6; margin-bottom: 0.8rem;
            display: block; letter-spacing: 2px;
        }
        .lifebook-icon { font-size: 1.8rem; margin-bottom: 1rem; display: block; opacity: 0.9; }
        .lifebook-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 600; color: var(--warm-white);
            font-size: 1.15rem; margin-bottom: 0.4rem;
        }
        .lifebook-desc {
            font-size: 0.8rem; color: rgba(232, 226, 217, 0.5);
            line-height: 1.5;
        }

        .values-section { padding: 5rem 0; text-align: center; }
        .values-grid {
            display: flex; justify-content: center;
            gap: 4rem; flex-wrap: wrap; margin-top: 3rem;
        }
        .value-item {
            text-align: center;
            transition: transform 0.4s ease;
        }
        .value-item:hover { transform: translateY(-5px); }
        .value-line {
            width: 1px; height: 40px;
            background: linear-gradient(to bottom, transparent, var(--ochre), transparent);
            margin: 0 auto 1.5rem; opacity: 0.5;
        }
        .value-icon {
            font-size: 2rem; margin-bottom: 1rem;
            display: block; opacity: 0.85;
        }
        .value-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.3rem; color: var(--warm-white);
            font-weight: 600; margin-bottom: 0.5rem;
        }
        .value-desc {
            font-size: 0.85rem; color: rgba(232, 226, 217, 0.55);
            max-width: 160px; line-height: 1.5;
        }

        .gallery-section { padding: 4rem 0; }
        .gallery-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            grid-template-rows: 280px 280px;
            gap: 12px; margin-top: 3rem;
        }
        .gallery-item { position: relative; overflow: hidden; border-radius: 2px; cursor: pointer; }
        .gallery-item:nth-child(1) { grid-row: 1 / 3; }
        .gallery-item:nth-child(2) { grid-column: 2; grid-row: 1; }
        .gallery-item:nth-child(3) { grid-column: 2; grid-row: 2; }
        
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            filter: brightness(0.85) saturate(0.9);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .gallery-item:hover img {
            transform: scale(1.05);
            filter: brightness(0.95) saturate(1);
        }
        .gallery-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 2.5rem 1.8rem 1.5rem;
            background: linear-gradient(to top, rgba(26,25,24,0.95) 0%, transparent 100%);
            transform: translateY(10px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .gallery-item:hover .gallery-overlay {
            transform: translateY(0); opacity: 1;
        }
        .gallery-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.3rem; color: var(--warm-white);
            font-weight: 600; margin-bottom: 0.3rem;
        }
        .gallery-subtitle {
            font-size: 0.85rem; color: var(--ochre);
            opacity: 0.8; letter-spacing: 1px;
        }

        .signup-section { padding: 5rem 0; display: flex; justify-content: center; }
        .signup-card {
            background: rgba(44, 42, 40, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-radius: 2px;
            padding: 4rem; max-width: 480px; width: 100%;
            position: relative; overflow: hidden;
        }
        .signup-card::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--ochre), transparent);
            opacity: 0.5;
        }
        .signup-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.4rem; text-align: center;
            margin-bottom: 3rem; color: var(--warm-white);
            position: relative; z-index: 1;
            font-weight: 600; font-style: italic;
        }
        .form-group { margin-bottom: 2rem; }
        label {
            display: block; margin-bottom: 0.7rem;
            color: var(--ochre); font-size: 0.8rem;
            font-weight: 500; letter-spacing: 2px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%; padding: 1rem 0;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0; background: transparent;
            color: var(--warm-white); font-size: 1.05rem;
            font-family: 'Inter', sans-serif; font-weight: 300;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none; border-bottom-color: var(--ochre);
            box-shadow: 0 1px 0 0 var(--ochre);
        }
